name: 📊 Weekly Review → Notion

on:
  schedule:
    - cron: '0 11 * * 0'   # 매주 일요일 UTC 11:00 = KST 20:00
  workflow_dispatch:

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Weekly Review
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
        run: python weekly_review.py

      - name: Summary
        if: always()
        run: echo "✅ Weekly Review 완료 — $(date '+%Y-%m-%d %H:%M KST')"
