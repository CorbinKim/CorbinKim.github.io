name: 📋 Daily Briefing → Notion

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 UTC 23:00 = KST 08:00
  workflow_dispatch:

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Daily Briefing
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
        run: python daily_briefing.py

      - name: Summary
        if: always()
        run: echo "✅ Daily Briefing 완료 — $(date '+%Y-%m-%d %H:%M KST')"
